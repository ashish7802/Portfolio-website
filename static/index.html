<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Stealth Web Agent</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles for the JSON output block */
        pre {
            white-space: pre-wrap;       /* css-3 */
            white-space: -moz-pre-wrap;  /* Mozilla, since 1999 */
            white-space: -pre-wrap;      /* Opera 4-6 */
            white-space: -o-pre-wrap;    /* Opera 7 */
            word-wrap: break-word;       /* Internet Explorer 5.5+ */
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-8 flex justify-center">

    <div class="max-w-4xl w-full">
        <!-- Header -->
        <div class="mb-10 text-center">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 mb-2">
                Stealth Web Agent
            </h1>
            <p class="text-slate-400">Autonomous web scraping & structured data extraction using Playwright and Google Gemini.</p>
        </div>

        <!-- Main Form Card -->
        <div class="bg-slate-800 rounded-xl shadow-2xl p-6 mb-8 border border-slate-700">
            <div class="mb-4">
                <label for="url" class="block text-sm font-medium text-slate-300 mb-1">Target URL</label>
                <input type="url" id="url" placeholder="https://news.ycombinator.com" 
                    class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
            </div>

            <div class="mb-6">
                <label for="instruction" class="block text-sm font-medium text-slate-300 mb-1">Extraction Instructions</label>
                <textarea id="instruction" rows="3" placeholder="Extract the top 5 stories with their titles and source links as a clean JSON array." 
                    class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all resize-y"></textarea>
            </div>

            <button id="runBtn" onclick="runAgent()" 
                class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-bold py-3 px-6 rounded-lg shadow-lg transform transition-all active:scale-95 flex items-center justify-center gap-2">
                <svg id="btnIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                <span>Run Agent</span>
            </button>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="hidden flex-col items-center justify-center p-8 bg-slate-800 rounded-xl shadow-xl border border-slate-700 mb-8">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mb-4"></div>
            <p class="text-blue-400 font-medium animate-pulse">Agent is browsing and parsing...</p>
            <p class="text-slate-500 text-sm mt-2">This may take a few seconds.</p>
        </div>

        <!-- Output State -->
        <div id="outputState" class="hidden">
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-xl font-bold text-slate-200 flex items-center gap-2">
                    <svg class="w-6 h-6 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    Extraction Results
                </h2>
                <button id="downloadExcelBtn" onclick="downloadExcel()" class="hidden bg-slate-700 hover:bg-slate-600 text-slate-200 font-semibold py-2 px-4 rounded shadow transition-colors flex items-center gap-2 text-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Download Excel (.xlsx)
                </button>
            </div>
            <div class="bg-slate-950 rounded-xl p-6 shadow-inner border border-slate-800 overflow-x-auto relative group">
                <button onclick="copyOutput()" class="absolute top-4 right-4 bg-slate-800 hover:bg-slate-700 text-slate-300 p-2 rounded-md opacity-0 group-hover:opacity-100 transition-opacity" title="Copy to clipboard">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                </button>
                <pre id="jsonOutput" class="text-green-400 font-mono text-sm"></pre>
            </div>
        </div>

        <!-- Error State -->
        <div id="errorState" class="hidden p-4 bg-red-900/50 border border-red-500 rounded-xl mb-8">
            <h3 class="text-red-400 font-bold mb-1 flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Error
            </h3>
            <p id="errorMsg" class="text-red-200 text-sm"></p>
        </div>

    </div>

    <script>
        window.currentData = null;

        async function runAgent() {
            const urlInput = document.getElementById('url').value.trim();
            const instructionInput = document.getElementById('instruction').value.trim();
            
            if (!urlInput || !instructionInput) {
                showError("Please provide both a Target URL and Extraction Instructions.");
                return;
            }

            // Reset UI states
            document.getElementById('errorState').classList.add('hidden');
            document.getElementById('outputState').classList.add('hidden');
            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('runBtn').disabled = true;
            document.getElementById('runBtn').classList.add('opacity-50', 'cursor-not-allowed');

            try {
                const response = await fetch('/api/extract', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: urlInput, instruction: instructionInput })
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.detail || "An unknown error occurred.");
                }

                // Show success output
                window.currentData = result.data;
                document.getElementById('jsonOutput').textContent = JSON.stringify(result.data, null, 2);
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('outputState').classList.remove('hidden');
                
                const excelBtn = document.getElementById('downloadExcelBtn');
                if (result.data && Array.isArray(result.data) && result.data.length > 0) {
                    excelBtn.classList.remove('hidden');
                } else {
                    excelBtn.classList.add('hidden');
                }

            } catch (error) {
                showError(error.message);
                document.getElementById('loadingState').classList.add('hidden');
            } finally {
                document.getElementById('runBtn').disabled = false;
                document.getElementById('runBtn').classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        function showError(msg) {
            document.getElementById('errorMsg').textContent = msg;
            document.getElementById('errorState').classList.remove('hidden');
        }

        function copyOutput() {
            const outputText = document.getElementById('jsonOutput').textContent;
            navigator.clipboard.writeText(outputText).then(() => {
                // Success
            });
        }
        async function downloadExcel() {
            if (!window.currentData || !Array.isArray(window.currentData) || window.currentData.length === 0) {
                alert("No valid data to download.");
                return;
            }

            try {
                // Replace null/undefined/empty string with "N/A"
                const cleanData = window.currentData.map(item => {
                    const cleanItem = {};
                    for (const key in item) {
                        let val = item[key];
                        if (val === null || val === undefined || val === '') {
                            cleanItem[key] = "N/A";
                        } else {
                            cleanItem[key] = val;
                        }
                    }
                    return cleanItem;
                });

                const response = await fetch('/api/download-excel', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(cleanData)
                });

                if (!response.ok) {
                    throw new Error("Failed to generate Excel file on the server.");
                }

                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                
                const link = document.createElement('a');
                link.href = url;
                link.setAttribute('download', 'extracted_leads.xlsx');
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            } catch (error) {
                alert(error.message);
            }
        }
    </script>
</body>
</html>
